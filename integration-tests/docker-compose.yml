services:
  postgres:
    image: postgres:18.3-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
    restart: always
    ports:
      - "127.0.0.1:0:5432"
    environment:
      POSTGRES_DB: itx-db
      POSTGRES_USER: itx-admin
      POSTGRES_PASSWORD: "itx-admin"
    command:
      - "-c"
      - "log_statement=all"

  postgres-init:
    image: flyway/flyway:12-alpine@sha256:1849e8e9a8878559183692e66eeae67249a6e17514cfac952177bf0178ab2fa9
    depends_on:
      - postgres
    restart: on-failure
    volumes:
      - type: bind
        source: ../storage/postgres/sql
        target: /flyway/sql
    command:
      - "-url=jdbc:postgresql://postgres:5432/itx-db"
      - "-user=itx-admin"
      - "-password=itx-admin"
      - "-locations=filesystem:/flyway/sql"
      - "-connectRetries=15"
      - "migrate"

  mariadb:
    image: mariadb:11.8@sha256:78a5047d3ba33975f183f183c2464cc7f1eab13ec8667e57cc9a5821d6da7577
    restart: always
    ports:
      - "127.0.0.1:0:3306"
    environment:
      MARIADB_DATABASE: itx-db
      MARIADB_USER: itx-admin
      MARIADB_PASSWORD: "itx-admin"
      MARIADB_ROOT_PASSWORD: "itx-admin"
    command:
      - "--general-log=1"
      - "--general-log-file=/var/log/mysql/general.log"

  mariadb-init:
    image: flyway/flyway:12-alpine@sha256:1849e8e9a8878559183692e66eeae67249a6e17514cfac952177bf0178ab2fa9
    depends_on:
      - mariadb
    restart: on-failure
    volumes:
      - type: bind
        source: ../storage/mariadb/sql
        target: /flyway/sql
    command:
      - "-url=jdbc:mariadb://mariadb:3306/itx-db"
      - "-user=itx-admin"
      - "-password=itx-admin"
      - "-locations=filesystem:/flyway/sql"
      - "-connectRetries=15"
      - "migrate"

  sqs:
    image: softwaremill/elasticmq-native:latest@sha256:e4580ab9ad1bd5cd37b4ba04911bc5ccc8cd2d9ab4de56ece65acee71c24e05c
    restart: always
    ports:
      - "127.0.0.1:0:9324"
      - "127.0.0.1:0:9325"
    volumes:
      - type: bind
        source: ./docker/elasticmq.conf
        target: /opt/elasticmq.conf

  sqs-ui:
    image: softwaremill/elasticmq-ui:latest@sha256:549f467ed95d7465cb471b43cd01a8691f5ac0fa5debc0d49ba65a73341c07fb
    ports:
      - "127.0.0.1:0:3000"
    environment:
      SQS_ENDPOINT: http://sqs:9324
    depends_on:
      - sqs

  rabbitmq:
    image: rabbitmq:4-management-alpine@sha256:8724c6573b43d315bcec914f16a509d0b5faf5f3b281a832b484ece0bbcbe914
    restart: always
    ports:
      - "127.0.0.1:0:5672"
      - "127.0.0.1:0:15672"
    environment:
      RABBITMQ_DEFAULT_USER: itx-admin
      RABBITMQ_DEFAULT_PASS: itx-admin
    volumes:
      - type: bind
        source: ./docker/rabbitmq.conf
        target: /etc/rabbitmq/rabbitmq.conf
      - type: bind
        source: ./docker/rabbitmq-definitions.json
        target: /etc/rabbitmq/definitions.json