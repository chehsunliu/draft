services:
  postgres:
    image: postgres:18.3-alpine
    restart: always
    ports:
      - "127.0.0.1:0:5432"
    environment:
      POSTGRES_DB: itx-db
      POSTGRES_USER: itx-admin
      POSTGRES_PASSWORD: "itx-admin"
    command:
      - "-c"
      - "log_statement=all"

  postgres-init:
    image: flyway/flyway:12-alpine
    depends_on:
      - postgres
    restart: on-failure
    volumes:
      - type: bind
        source: ../storage/postgres/sql
        target: /flyway/sql
    command:
      - "-url=jdbc:postgresql://postgres:5432/itx-db"
      - "-user=itx-admin"
      - "-password=itx-admin"
      - "-locations=filesystem:/flyway/sql"
      - "-connectRetries=15"
      - "migrate"

  mariadb:
    image: mariadb:11.4
    restart: always
    ports:
      - "127.0.0.1:0:3306"
    environment:
      MARIADB_DATABASE: itx-db
      MARIADB_USER: itx-admin
      MARIADB_PASSWORD: "itx-admin"
      MARIADB_ROOT_PASSWORD: "itx-admin"
    command:
      - "--general-log=1"
      - "--general-log-file=/var/log/mysql/general.log"

  mariadb-init:
    image: flyway/flyway:12-alpine
    depends_on:
      - mariadb
    restart: on-failure
    volumes:
      - type: bind
        source: ../storage/mariadb/sql
        target: /flyway/sql
    command:
      - "-url=jdbc:mariadb://mariadb:3306/itx-db"
      - "-user=itx-admin"
      - "-password=itx-admin"
      - "-locations=filesystem:/flyway/sql"
      - "-connectRetries=15"
      - "migrate"

  sqs:
    image: softwaremill/elasticmq-native:latest
    restart: always
    ports:
      - "127.0.0.1:0:9324"
      - "127.0.0.1:0:9325"
    volumes:
      - type: bind
        source: ./docker/elasticmq.conf
        target: /opt/elasticmq.conf

  sqs-ui:
    image: softwaremill/elasticmq-ui:latest
    ports:
      - "127.0.0.1:0:3000"
    environment:
      SQS_ENDPOINT: http://sqs:9324
    depends_on:
      - sqs

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: always
    ports:
      - "127.0.0.1:0:5672"
      - "127.0.0.1:0:15672"
    environment:
      RABBITMQ_DEFAULT_USER: itx-admin
      RABBITMQ_DEFAULT_PASS: itx-admin
    volumes:
      - type: bind
        source: ./docker/rabbitmq.conf
        target: /etc/rabbitmq/rabbitmq.conf
      - type: bind
        source: ./docker/rabbitmq-definitions.json
        target: /etc/rabbitmq/definitions.json