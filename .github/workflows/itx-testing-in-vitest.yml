name: ITX Testing in Vitest

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  rust-integration-test:
    name: rust-integration-test (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: aws
            docker-init-services: postgres-init
    defaults:
      run:
        working-directory: integration-tests/vitest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: integration-tests/vitest/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.10

      - name: Set Rust caching env vars
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Check Rust formatting
        working-directory: itx-rs
        run: cargo fmt --all -- --check

      - name: Build binaries
        working-directory: itx-rs
        run: cargo build

      - name: Start containers
        working-directory: integration-tests
        run: docker compose up -d

      - name: Wait for init services
        working-directory: integration-tests
        run: docker compose wait ${{ matrix.docker-init-services }}

      - name: Run integration tests
        timeout-minutes: 5
        run: npm test
        env:
          ITX_TEST_PROFILE: ${{ matrix.profile }}

      - name: Shutdown containers
        if: always()
        working-directory: integration-tests
        run: docker compose down --remove-orphans -v --timeout 5 || true

  golang-integration-test:
    name: golang-integration-test (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: aws
            docker-init-services: postgres-init
    defaults:
      run:
        working-directory: integration-tests/vitest
    env:
      ITX_LANG: golang
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: integration-tests/vitest/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - uses: actions/setup-go@v6
        with:
          go-version-file: itx-go/itx-backend/go.mod
          cache-dependency-path: itx-go/itx-backend/go.sum

      - name: Check Go formatting
        working-directory: itx-go
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build binaries
        working-directory: itx-go
        run: make build

      - name: Start containers
        working-directory: integration-tests
        run: docker compose up -d

      - name: Wait for init services
        working-directory: integration-tests
        run: docker compose wait ${{ matrix.docker-init-services }}

      - name: Run integration tests
        timeout-minutes: 5
        run: npm test
        env:
          ITX_TEST_PROFILE: ${{ matrix.profile }}

      - name: Shutdown containers
        if: always()
        working-directory: integration-tests
        run: docker compose down --remove-orphans -v --timeout 5 || true
