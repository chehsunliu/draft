name: ITX Testing in Pytest

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  rust-integration-test:
    name: rust-integration-test (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: onprem
            docker-init-services: mariadb-init
          - profile: aws
            docker-init-services: postgres-init
    defaults:
      run:
        working-directory: integration-tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install Python dependencies
        run: uv sync

      - name: Check formatting
        run: make check

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Set Rust caching env vars
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Check Rust formatting
        working-directory: itx-rs
        run: cargo fmt --all -- --check

      - name: Build binaries
        working-directory: itx-rs
        run: cargo build

      - name: Start containers
        run: docker compose up -d

      - name: Wait for init services
        run: docker compose wait ${{ matrix.docker-init-services }}

      - name: Run integration tests
        timeout-minutes: 5
        run: uv run pytest --durations=50
        env:
          ITX_TEST_PROFILE: ${{ matrix.profile }}

      - name: Shutdown containers
        run: docker compose down --remove-orphans -v --timeout 5 || true

  golang-integration-test:
    name: golang-integration-test (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: onprem
            docker-init-services: mariadb-init
          - profile: aws
            docker-init-services: postgres-init
    defaults:
      run:
        working-directory: integration-tests
    env:
      ITX_LANG: golang
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.14

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install Python dependencies
        run: uv sync

      - name: Check formatting
        run: make check

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: itx-go/itx-backend/go.mod
          cache-dependency-path: itx-go/itx-backend/go.sum

      - name: Check Go formatting
        working-directory: itx-go
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build binaries
        working-directory: itx-go
        run: make build

      - name: Start containers
        run: docker compose up -d

      - name: Wait for init services
        run: docker compose wait ${{ matrix.docker-init-services }}

      - name: Run integration tests
        timeout-minutes: 5
        run: uv run pytest --durations=50
        env:
          ITX_TEST_PROFILE: ${{ matrix.profile }}

      - name: Shutdown containers
        run: docker compose down --remove-orphans -v --timeout 5 || true
