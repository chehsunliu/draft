spring:
  application:
    name: itx-backend
  main:
    banner-mode: "off"
  mvc:
    throw-exception-if-no-handler-found: true
    servlet:
      # Initialize the dispatcher at startup so its init logs don't bleed into
      # the first request — the integration tests assert zero log lines per
      # successful request.
      load-on-startup: 1
  web:
    resources:
      add-mappings: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  shutdown: graceful

logging:
  structured:
    format:
      console: logstash
  level:
    root: INFO

itx:
  db:
    provider: ${ITX_DB_PROVIDER:postgres}
  queue:
    provider: ${ITX_QUEUE_PROVIDER:sqs}
  postgres:
    host: ${ITX_POSTGRES_HOST:localhost}
    port: ${ITX_POSTGRES_PORT:5432}
    db-name: ${ITX_POSTGRES_DB_NAME:itx-db}
    user: ${ITX_POSTGRES_USER:itx-admin}
    password: ${ITX_POSTGRES_PASSWORD:itx-admin}
  mariadb:
    host: ${ITX_MARIADB_HOST:localhost}
    port: ${ITX_MARIADB_PORT:3306}
    db-name: ${ITX_MARIADB_DB_NAME:itx-db}
    user: ${ITX_MARIADB_USER:itx-admin}
    password: ${ITX_MARIADB_PASSWORD:itx-admin}
  sqs:
    local-endpoint-url: ${ITX_SQS_LOCAL_ENDPOINT_URL:}
    max-concurrency: ${ITX_SQS_MAX_CONCURRENCY:100}
    control-standard-queue-url: ${ITX_SQS_CONTROL_STANDARD_QUEUE_URL:}
    control-premium-queue-url: ${ITX_SQS_CONTROL_PREMIUM_QUEUE_URL:}
    compute-standard-queue-url: ${ITX_SQS_COMPUTE_STANDARD_QUEUE_URL:}
    compute-premium-queue-url: ${ITX_SQS_COMPUTE_PREMIUM_QUEUE_URL:}
  rabbitmq:
    host: ${ITX_RABBITMQ_HOST:localhost}
    port: ${ITX_RABBITMQ_PORT:5672}
    user: ${ITX_RABBITMQ_USER:itx-admin}
    password: ${ITX_RABBITMQ_PASSWORD:itx-admin}
    max-concurrency: ${ITX_RABBITMQ_MAX_CONCURRENCY:100}
    control-standard-queue: ${ITX_RABBITMQ_CONTROL_STANDARD_QUEUE:}
    control-premium-queue: ${ITX_RABBITMQ_CONTROL_PREMIUM_QUEUE:}
    compute-standard-queue: ${ITX_RABBITMQ_COMPUTE_STANDARD_QUEUE:}
    compute-premium-queue: ${ITX_RABBITMQ_COMPUTE_PREMIUM_QUEUE:}
