spring:
  datasource:
    url: jdbc:mariadb://${ITX_MARIADB_HOST}:${ITX_MARIADB_PORT}/${ITX_MARIADB_DB_NAME}
    username: ${ITX_MARIADB_USER}
    password: ${ITX_MARIADB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        timezone:
          default_storage: NORMALIZE_UTC
        type:
          preferred_uuid_jdbc_type: CHAR
